<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Connexion TikTok...</title>
  <style>
    body { background: #0f0f0f; color: #f0f0f0; font-family: Arial, sans-serif;
           display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
    .box { text-align: center; }
    .spinner { width: 40px; height: 40px; border: 3px solid #333;
               border-top-color: #fe2c55; border-radius: 50%;
               animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { color: #888; font-size: .9rem; }
    a { color: #fe2c55; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>Connexion TikTok en cours...</p>
    <p id="msg"></p>
  </div>
  <script>
    const params = window.location.search;
    const p      = new URLSearchParams(params);
    const code   = p.get('code');
    const error  = p.get('error');

    if (error) {
      document.getElementById('msg').textContent = 'Erreur TikTok : ' + error;
      document.querySelector('.spinner').style.display = 'none';
    } else if (code) {
      const target = 'http://localhost:5000/tiktok/callback' + params;
      document.getElementById('msg').innerHTML =
        'Redirection vers le dashboard... <a href="' + target + '">Cliquer ici si pas automatique</a>';
      setTimeout(() => { window.location.href = target; }, 800);
    } else {
      document.getElementById('msg').textContent = 'Paramètres manquants.';
    }
  </script>
</body>
</html>
